# GeoDNS Explorer — Nginx Configuration
# ========================================
# Serves the React frontend as static files and proxies /api/ requests
# to the FastAPI backend running on 127.0.0.1:8000.
#
# Deployed to: /etc/nginx/sites-available/geodns-explorer
# Symlink:     /etc/nginx/sites-enabled/geodns-explorer

server {
    listen 80;
    server_name _;

    # Frontend (built static files from Vite)
    root /var/www/geodns-explorer;
    index index.html;

    # SPA fallback — lets React Router handle client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy — forwards /api/* to the FastAPI backend
    # Note: proxy_pass WITHOUT trailing slash preserves the /api/ prefix
    # in the forwarded request, matching the backend's /api/* routes.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # ──────────────────────────────────────────────────────────────
    # HTTPS / Certbot
    # If you run deploy.sh with --domain, certbot will automatically
    # add the SSL configuration below this line. You can also add it
    # manually with:
    #   certbot --nginx -d yourdomain.com
    # ──────────────────────────────────────────────────────────────
}
